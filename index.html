<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="retro bowl.jpg" type="image/jpeg">
    <title>Retro Bowl POV | Pro Edition</title>
    <style>
        :root { --accent: #f1c40f; --bg: #1a1a1a; }
        body { margin: 0; overflow: hidden; background: #27ae60; font-family: 'Segoe UI', Roboto, sans-serif; }
        
        /* Top Navigation Bar */
        .topnav { position: absolute; top: 0; width: 100%; display: flex; justify-content: center; gap: 5px; padding: 10px; z-index: 101; background: rgba(0,0,0,0.5); backdrop-filter: blur(5px); }
        .divbutton { padding: 8px 16px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.3); color: white; cursor: pointer; font-weight: 600; text-transform: uppercase; font-size: 12px; transition: 0.2s; }
        .divbutton:hover { background: white; color: black; border-color: white; }

        /* HUD */
        #ui-layer { position: absolute; inset: 0; pointer-events: none; z-index: 5; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 10px; height: 10px; border: 2px solid white; border-radius: 50%; transform: translate(-50%, -50%); }
        #stats { position: absolute; top: 70px; left: 20px; color: white; text-shadow: 2px 2px 0px #000; font-size: 28px; font-weight: 900; }
        
        /* Power Meter */
        #power-meter { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); width: 250px; height: 15px; background: rgba(0,0,0,0.6); border: 2px solid white; display: none; border-radius: 20px; overflow: hidden; }
        #power-fill { width: 0%; height: 100%; background: linear-gradient(90deg, #f1c40f, #e67e22); }

        /* Touchdown Notification */
        #td-overlay { position: absolute; inset: 0; display: none; align-items: center; justify-content: center; background: rgba(241, 196, 15, 0.3); z-index: 150; pointer-events: none; }
        #td-overlay h1 { font-size: 100px; color: white; text-shadow: 0 0 20px #000; animation: flash 0.5s infinite; }

        /* Menu */
        .menu { position: absolute; inset: 0; background: radial-gradient(circle, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0.9) 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; z-index: 200; backdrop-filter: blur(10px); }
        .menu-card { background: rgba(255,255,255,0.05); padding: 50px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.1); text-align: center; }
        .btn-play { padding: 18px 60px; background: #fff; color: #000; border: none; border-radius: 12px; font-weight: 900; cursor: pointer; font-size: 22px; transition: 0.3s; margin-top: 20px; box-shadow: 0 10px 0 #bdc3c7; }
        .btn-play:hover { transform: translateY(-3px); box-shadow: 0 13px 0 #bdc3c7; }
        .btn-play:active { transform: translateY(5px); box-shadow: 0 5px 0 #bdc3c7; }

        @keyframes flash { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body>

    <div class="topnav">
        <a href="index.html"><button class="divbutton">Home</button></a>
        <a href="games.html"><button class="divbutton">Games</button></a>
        <a href="shooter.html"><button class="divbutton">Shooter</button></a>
        <a href="sports.html"><button class="divbutton">Sports</button></a>
        <a href="cars.html"><button class="divbutton">Cars</button></a>
    </div>

    <div id="td-overlay"><h1>TOUCHDOWN!</h1></div>

    <div id="ui-layer">
        <div id="crosshair"></div>
        <div id="stats">SCORE: <span id="score-val">0</span></div>
        <div id="power-meter"><div id="power-fill"></div></div>
    </div>

    <div id="menu-container" class="menu">
        <div class="menu-card">
            <h1 style="font-size: 60px; margin: 0; letter-spacing: -2px;">RETRO BOWL <span style="color:var(--accent)">POV</span></h1>
            <p style="margin: 20px 0; opacity: 0.7;">FIRST PERSON FOOTBALL SIMULATOR</p>
            <button class="btn-play" id="start-btn">KICK OFF</button>
        </div>
    </div>

    <script type="importmap"> { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } } </script>
    <script type="module" src="game.js"></script>
</body>
</html>
