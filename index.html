<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRO FOOTBALL - Fixed Speed & Gear</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <style>
        :root { --nfl-orange: #fb4f14; --nfl-blue: #002244; }
        body { margin: 0; padding: 0; overflow: hidden; background: #000; font-family: 'Arial Black', sans-serif; }
        canvas { display: block; }
        #ui { position: absolute; inset: 0; pointer-events: none; z-index: 10; padding: 40px; }
        #stats { color: white; font-size: 42px; text-shadow: 0px 4px 10px rgba(0,0,0,0.8); font-style: italic; }
        #menu { position: absolute; inset: 0; background: radial-gradient(circle, rgba(0,20,40,0.95), #000); display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; z-index: 100; text-align: center; }
        .btn { padding: 25px 100px; background: var(--nfl-orange); color: white; border: 2px solid white; font-size: 32px; cursor: pointer; font-weight: bold; text-transform: uppercase; border-radius: 4px; box-shadow: 0 10px 0 #8a2b0c; }
        .btn:active { transform: translateY(6px); box-shadow: 0 4px 0 #8a2b0c; }
        #msg { position: absolute; top: 20%; width: 100%; text-align: center; color: var(--nfl-orange); font-size: 80px; display: none; pointer-events: none; text-shadow: 4px 4px 0 #000; z-index: 1000; }
    </style>
</head>
<body>

    <div id="ui"><div id="stats">SCORE: <span id="score" style="color:var(--nfl-orange)">0</span></div></div>
    <div id="msg">TACKLED!</div>

    <div id="menu">
        <h1 style="font-size: 90px; margin: 0; letter-spacing: -4px;">PRO FOOTBALL</h1>
        <button class="btn" id="start-btn">START GAME</button>
        <p style="margin-top:20px;"><b>WASD</b> Move | <b>SHIFT</b> Sprint | <b>Y</b> Kick | <b>CLICK</b> Throw | <b>U</b> Switch Cam</p>
    </div>

    <script>
        let scene, camera, renderer, player, ballInHand, is3rd = false;
        let score = 0, gameActive = false, footballs = [], npcs = [], keys = {};
        const playerPos = new THREE.Vector3(0, 0, 150);
        
        let targetYaw = 0, targetPitch = 0;
        let currentYaw = 0, currentPitch = 0;
        let shake = 0, walkCycle = 0;
        let isKicking = false, kickProgress = 0;

        let leftLeg, rightLeg, leftArm, rightArm, torsoGroup;

        // --- DEFENDER CLASS ---
        class Defender {
            constructor(x, z) {
                this.group = createFullCharacter(0xbb0000, 0x000044); 
                this.pos = new THREE.Vector3(x, 0, z);
                // NPCs are now significantly slower (0.35 - 0.45) vs Player (0.8 - 1.35)
                this.speed = 0.35 + Math.random() * 0.1;
                scene.add(this.group);
            }
            update(target) {
                const dir = new THREE.Vector3().subVectors(target, this.pos).normalize();
                this.pos.addScaledVector(dir, this.speed);
                this.group.position.copy(this.pos);
                this.group.lookAt(target.x, 0, target.z);
                if (this.pos.distanceTo(target) < 4.8) resetPlay("TACKLED!");
            }
        }

        function resetPlay(text) {
            if(text) {
                const el = document.getElementById('msg');
                el.innerText = text; el.style.display = 'block';
                setTimeout(() => el.style.display = 'none', 1200);
            }
            shake = 0.6;
            playerPos.set(0, 0, 150);
            npcs.forEach((n, i) => n.pos.set((Math.random() - 0.5) * 140, 0, -100 - (i * 90)));
        }

        // --- MODELS ---
        function createFullCharacter(pCol, sCol) {
            const group = new THREE.Group();
            const matP = new THREE.MeshStandardMaterial({color: pCol});
            const matS = new THREE.MeshStandardMaterial({color: sCol});
            const matChrome = new THREE.MeshStandardMaterial({color: 0xcccccc, metalness: 0.8});

            const torso = new THREE.Mesh(new THREE.CylinderGeometry(1.2, 0.9, 2.2, 12), matP);
            torso.position.y = 1.1; torso.scale.set(1.1, 1, 0.7);
            group.add(torso);

            // Helmet logic
            const helm = new THREE.Mesh(new THREE.SphereGeometry(0.85, 16, 16), matP);
            helm.position.y = 2.8;
            const mask = new THREE.Mesh(new THREE.TorusGeometry(0.48, 0.05, 8, 16, Math.PI), matChrome);
            mask.position.set(0, 2.5, -0.55);
            group.add(helm, mask);

            group.position.y = 2.4;
            return group;
        }

        function createEliteBall() {
            const ball = new THREE.Group();
            const leather = new THREE.MeshStandardMaterial({ color: 0x4d2613, roughness: 0.7 });
            const body = new THREE.Mesh(new THREE.SphereGeometry(0.55, 32, 32), leather);
            body.scale.set(1, 0.8, 1.8);
            
            const ringMat = new THREE.MeshBasicMaterial({color: 0xffffff});
            const r1 = new THREE.Mesh(new THREE.TorusGeometry(0.35, 0.04, 8, 32), ringMat);
            r1.position.z = 0.6;
            const r2 = r1.clone(); r2.position.z = -0.6;
            
            const laces = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.1, 0.8), ringMat);
            laces.position.set(0, 0.45, 0);
            
            ball.add(body, r1, r2, laces);
            return ball;
        }

        function createGrassTexture(c1, c2) {
            const canvas = document.createElement('canvas');
            canvas.width = 512; canvas.height = 512;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = c1; ctx.fillRect(0, 0, 512, 512);
            for (let i = 0; i < 15000; i++) {
                ctx.fillStyle = Math.random() > 0.5 ? c2 : 'rgba(0,0,0,0.1)';
                ctx.fillRect(Math.random()*512, Math.random()*512, 2, 4);
            }
            const tex = new THREE.CanvasTexture(canvas);
            tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
            tex.repeat.set(4, 1);
            return tex;
        }

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x60a3bc);
            scene.fog = new THREE.FogExp2(0x60a3bc, 0.001);

            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 3000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 0.6));
            const sun = new THREE.DirectionalLight(0xffffff, 1.5);
            sun.position.set(100, 200, 50);
            sun.castShadow = true;
            scene.add(sun);

            const grassL = createGrassTexture('#2d5a27', '#3a6e33');
            const grassD = createGrassTexture('#244a1f', '#2d5a27');
            for(let i = -1500; i < 600; i += 20) {
                const mat = new THREE.MeshStandardMaterial({ map: (i/20)%2===0 ? grassL : grassD });
                const strip = new THREE.Mesh(new THREE.PlaneGeometry(260, 20), mat);
                strip.rotation.x = -Math.PI/2; strip.position.z = i + 10;
                strip.receiveShadow = true;
                scene.add(strip);
            }

            // PLAYER MODEL RESTORATION
            player = new THREE.Group();
            torsoGroup = new THREE.Group();
            const matWhite = new THREE.MeshPhysicalMaterial({ color: 0xffffff, metalness: 0.1, roughness: 0.1, clearcoat: 1.0 });
            
            const torso = new THREE.Mesh(new THREE.CylinderGeometry(1.2, 0.9, 2.2, 12), matWhite);
            torso.position.y = 1.1; torso.scale.set(1.1, 1, 0.7);
            torsoGroup.add(torso);

            // ARM & LEG CREATION
            const createArm = (side) => {
                const armPivot = new THREE.Group();
                const upper = new THREE.Mesh(new THREE.CylinderGeometry(0.35, 0.3, 1.2), matWhite);
                upper.position.y = -0.6;
                const lower = new THREE.Mesh(new THREE.CylinderGeometry(0.25, 0.2, 1.2), new THREE.MeshStandardMaterial({color: 0x8d5524}));
                lower.position.y = -1.6;
                armPivot.add(upper, lower); armPivot.position.set(side * 1.3, 1.8, 0);
                return armPivot;
            };
            leftArm = createArm(1); rightArm = createArm(-1);
            torsoGroup.add(leftArm, rightArm);

            const createLeg = (side) => {
                const legPivot = new THREE.Group();
                const thigh = new THREE.Mesh(new THREE.CylinderGeometry(0.45, 0.35, 1.6), matWhite);
                thigh.position.y = -0.8;
                const shin = new THREE.Mesh(new THREE.CylinderGeometry(0.35, 0.25, 1.6), matWhite);
                shin.position.y = -2.2;
                const foot = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.4, 1.2), new THREE.MeshStandardMaterial({color: 0x002244}));
                foot.position.set(0, -3.0, -0.3);
                legPivot.add(thigh, shin, foot); legPivot.position.set(side * 0.5, 2.4, 0);
                return legPivot;
            };
            leftLeg = createLeg(-1); rightLeg = createLeg(1);
            
            // THE HELMET
            const helm = new THREE.Mesh(new THREE.SphereGeometry(0.85, 32, 32), matWhite);
            helm.position.y = 2.8;
            const helmStripe = new THREE.Mesh(new THREE.BoxGeometry(0.2, 1.8, 1.8), new THREE.MeshStandardMaterial({color: 0xfb4f14}));
            helmStripe.position.y = 2.8;
            const mask = new THREE.Mesh(new THREE.TorusGeometry(0.48, 0.05, 12, 24, Math.PI), new THREE.MeshStandardMaterial({color: 0xcccccc, metalness: 1}));
            mask.position.set(0, 2.5, -0.55);
            torsoGroup.add(helm, helmStripe, mask);

            torsoGroup.position.y = 2.7;
            player.add(leftLeg, rightLeg, torsoGroup);
            player.visible = false;
            scene.add(player);

            // GOAL POST
            const matGold = new THREE.MeshStandardMaterial({ color: 0xffd700, metalness: 0.6 });
            const goal = new THREE.Group();
            const p1 = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.5, 15), matGold); p1.position.y = 7.5;
            const p2 = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.4, 18), matGold); p2.rotation.z = Math.PI/2; p2.position.y = 15;
            const p3 = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.4, 20), matGold); p3.position.set(-9, 25, 0);
            const p4 = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.4, 20), matGold); p4.position.set(9, 25, 0);
            goal.add(p1, p2, p3, p4); goal.position.z = -480;
            scene.add(goal);

            // NPCs
            for(let i=0; i<6; i++) npcs.push(new Defender((Math.random()-0.5)*110, -120 - i*60));

            ballInHand = createEliteBall();
            ballInHand.position.set(1.2, -0.9, -2);
            camera.add(ballInHand);
            scene.add(camera);

            document.getElementById('start-btn').onclick = () => { 
                gameActive = true; document.getElementById('menu').style.display = 'none'; document.body.requestPointerLock(); 
            };
            
            window.addEventListener('keydown', (e) => { 
                const k = e.key.toLowerCase(); keys[k] = true; 
                if(k === 'u') { is3rd = !is3rd; player.visible = is3rd; ballInHand.visible = !is3rd; }
                if(gameActive && k === 'y' && !isKicking) { isKicking = true; kickProgress = 0; kickBall(); }
            });
            window.addEventListener('keyup', (e) => keys[e.key.toLowerCase()] = false);
            window.addEventListener('mousemove', (e) => { 
                if(gameActive) { targetYaw -= e.movementX*0.0015; targetPitch -= e.movementY*0.0015; targetPitch = Math.max(-1.4, Math.min(1.4, targetPitch)); } 
            });
            window.addEventListener('mousedown', () => { if(gameActive) throwBall(); });

            animate();
        }

        function throwBall() {
            const b = createEliteBall();
            const p = new THREE.Vector3();
            if(!is3rd) ballInHand.getWorldPosition(p); else p.copy(playerPos).add(new THREE.Vector3(0, 5, 0));
            b.position.copy(p);
            const dir = new THREE.Vector3(); camera.getWorldDirection(dir);
            footballs.push({ mesh: b, vel: dir.multiplyScalar(4.2), grav: -0.05, rotSpeed: 0.5, scored: false });
            scene.add(b);
            shake = 0.1;
        }

        function kickBall() {
            const b = createEliteBall();
            b.position.copy(playerPos).add(new THREE.Vector3(0, 0.5, -2));
            const dir = new THREE.Vector3(); camera.getWorldDirection(dir);
            dir.y += 0.45;
            footballs.push({ mesh: b, vel: dir.multiplyScalar(5.0), grav: -0.04, rotSpeed: 0.2, scored: false });
            scene.add(b);
            shake = 0.15;
        }

        function animate() {
            requestAnimationFrame(animate);
            if(gameActive) {
                currentYaw += (targetYaw - currentYaw) * 0.15;
                currentPitch += (targetPitch - currentPitch) * 0.15;

                const moving = keys['w'] || keys['s'] || keys['a'] || keys['d'];
                const speed = keys['shift'] ? 1.35 : 0.8;
                const f = new THREE.Vector3(Math.sin(currentYaw), 0, Math.cos(currentYaw)).negate();
                const r = new THREE.Vector3().crossVectors(f, new THREE.Vector3(0,1,0)).normalize();

                if(keys['w']) playerPos.addScaledVector(f, speed);
                if(keys['s']) playerPos.addScaledVector(f, -speed);
                if(keys['a']) playerPos.addScaledVector(r, -speed);
                if(keys['d']) playerPos.addScaledVector(r, speed);

                // Animations
                if(moving && !isKicking) {
                    walkCycle += keys['shift'] ? 0.3 : 0.15;
                    const swing = Math.sin(walkCycle) * 0.6;
                    leftLeg.rotation.x = swing; rightLeg.rotation.x = -swing;
                    leftArm.rotation.x = -swing; rightArm.rotation.x = swing;
                    torsoGroup.position.y = 2.7 + Math.abs(Math.cos(walkCycle)) * 0.15;
                } else if (!isKicking) {
                    leftLeg.rotation.x *= 0.8; rightLeg.rotation.x *= 0.8;
                    torsoGroup.position.y = THREE.MathUtils.lerp(torsoGroup.position.y, 2.7, 0.1);
                }

                if(isKicking) {
                    kickProgress += 0.08;
                    rightLeg.rotation.x = (kickProgress < 0.3) ? THREE.MathUtils.lerp(0, 1.8, kickProgress/0.3) : THREE.MathUtils.lerp(1.8, 0, (kickProgress-0.3)/0.7);
                    if(kickProgress >= 1) { isKicking = false; kickProgress = 0; }
                }

                player.position.copy(playerPos);
                player.rotation.y = currentYaw;
                camera.rotation.set(currentPitch, currentYaw, 0, 'YXZ');
                
                if(!is3rd) camera.position.copy(playerPos).add(new THREE.Vector3(0, 5.2, 0.2));
                else {
                    const offset = new THREE.Vector3(1.5, 7, 14).applyQuaternion(camera.quaternion);
                    camera.position.lerp(playerPos.clone().add(offset), 0.15);
                }

                if(shake > 0) { camera.position.x += (Math.random()-0.5)*shake; shake *= 0.85; }

                npcs.forEach(npc => npc.update(playerPos));

                for (let i = footballs.length - 1; i >= 0; i--) {
                    let fb = footballs[i];
                    fb.vel.y += fb.grav; fb.mesh.position.add(fb.vel);
                    fb.mesh.rotateZ(fb.rotSpeed);
                    if(!fb.scored && fb.mesh.position.z < -480 && fb.mesh.position.z > -495) {
                        if(fb.mesh.position.y > 15 && Math.abs(fb.mesh.position.x) < 9) {
                            fb.scored = true; score += 3; document.getElementById('score').innerText = score;
                            resetPlay("FIELD GOAL!");
                        }
                    }
                    if(fb.mesh.position.y < 0.1) { scene.remove(fb.mesh); footballs.splice(i, 1); }
                }

                if(playerPos.z < -450) { score += 7; document.getElementById('score').innerText = score; resetPlay("TOUCHDOWN!"); }
            }
            renderer.render(scene, camera);
        }
        init();
    </script>
</body>
</html>
