<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POV Football Simulator</title>
    <style>
        body { margin: 0; overflow: hidden; background: #2ecc71; font-family: 'Segoe UI', sans-serif; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 8px; height: 8px; border: 2px solid white; border-radius: 50%; transform: translate(-50%, -50%); z-index: 10; pointer-events: none; }
        
        #ui-layer { position: absolute; inset: 0; pointer-events: none; z-index: 5; }
        #stats { position: absolute; top: 20px; left: 20px; color: white; text-shadow: 2px 2px 0px #000; font-size: 24px; font-weight: 900; }
        #power-meter { position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%); width: 200px; height: 12px; background: rgba(0,0,0,0.5); border: 2px solid white; display: none; border-radius: 6px; overflow: hidden; }
        #power-fill { width: 0%; height: 100%; background: #f1c40f; transition: width 0.05s; }

        .menu { position: absolute; inset: 0; background: rgba(0,0,0,0.85); display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; z-index: 100; backdrop-filter: blur(8px); }
        .menu-card { background: rgba(255,255,255,0.1); padding: 50px; border-radius: 20px; text-align: center; border: 1px solid rgba(255,255,255,0.2); }
        .btn { padding: 15px 50px; background: #fff; color: #000; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 20px; transition: 0.2s; margin-top: 20px; }
        .btn:hover { background: #2ecc71; color: white; transform: scale(1.1); }
    </style>
</head>
<body>
    <div id="crosshair"></div>
    <div id="ui-layer">
        <div id="stats">GRIDIRON POV</div>
        <div id="power-meter"><div id="power-fill"></div></div>
    </div>

    <div id="menu-container" class="menu">
        <div class="menu-card">
            <h1 style="font-size: 48px; margin: 0;">RETRO BOWL: POV</h1>
            <p style="opacity: 0.8;">WASD: Run | SHIFT: Sprint | HOLD CLICK: Power Throw</p>
            <button class="btn" id="start-btn">ENTER FIELD</button>
        </div>
    </div>

    <script type="importmap"> { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } } </script>
    <script type="module" src="game.js"></script>
</body>
</html>
