<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>football - Fixed Kick Physics</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <style>
        :root { --nfl-orange: #fb4f14; --nfl-blue: #002244; }
        body { margin: 0; padding: 0; overflow: hidden; background: #000; font-family: 'Arial Black', sans-serif; }
        canvas { display: block; }
        #ui { position: absolute; inset: 0; pointer-events: none; z-index: 10; padding: 40px; }
        #stats { color: white; font-size: 42px; text-shadow: 0px 4px 10px rgba(0,0,0,0.8); font-style: italic; }
        #menu { position: absolute; inset: 0; background: radial-gradient(circle, rgba(0,20,40,0.95), #000); display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; z-index: 100; text-align: center; }
        .btn { padding: 25px 100px; background: var(--nfl-orange); color: white; border: 2px solid white; font-size: 32px; cursor: pointer; font-weight: bold; text-transform: uppercase; border-radius: 4px; box-shadow: 0 10px 0 #8a2b0c; }
        .btn:active { transform: translateY(6px); box-shadow: 0 4px 0 #8a2b0c; }
    </style>
</head>
<body>

    <div id="ui"><div id="stats">eps: <span id="score" style="color:var(--nfl-orange)">0</span></div></div>

    <div id="menu">
        <h1 style="font-size: 90px; margin: 0; letter-spacing: -4px;">FOOTBALL</h1>
        <button class="btn" id="start-btn">START</button>
        <p style="margin-top:20px;"><b>KICK PHYSICS FIXED</b> | Y to Kick | WASD to Move</p>
    </div>

    <script>
        let scene, camera, renderer, player, ballInHand, is3rd = false;
        let score = 0, gameActive = false, footballs = [], keys = {};
        const playerPos = new THREE.Vector3(0, 0, 150);
        
        let targetYaw = 0, targetPitch = 0;
        let currentYaw = 0, currentPitch = 0;
        let shake = 0, walkCycle = 0;
        
        // Kick Animation Variables
        let isKicking = false;
        let kickProgress = 0; // 0 to 1

        let leftLeg, rightLeg, leftArm, rightArm, torsoGroup;

        function createGrassTexture(color1, color2) {
            const canvas = document.createElement('canvas');
            canvas.width = 512; canvas.height = 512;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = color1;
            ctx.fillRect(0, 0, 512, 512);
            for (let i = 0; i < 20000; i++) {
                ctx.fillStyle = Math.random() > 0.5 ? color2 : 'rgba(0,0,0,0.1)';
                ctx.fillRect(Math.random() * 512, Math.random() * 512, 2, 4);
            }
            const tex = new THREE.CanvasTexture(canvas);
            tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
            tex.repeat.set(4, 1);
            return tex;
        }

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x60a3bc);
            scene.fog = new THREE.FogExp2(0x60a3bc, 0.0012);

            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 3000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap; 
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.0;
            document.body.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 0.5));
            const sun = new THREE.DirectionalLight(0xffffff, 2.0);
            sun.position.set(200, 400, 100);
            sun.castShadow = true;
            sun.shadow.mapSize.set(2048, 2048);
            scene.add(sun);

            const grassLight = createGrassTexture('#2d5a27', '#3a6e33');
            const grassDark = createGrassTexture('#244a1f', '#2d5a27');
            const endzoneTex = createGrassTexture('#001a33', '#002244');

            for(let i = -1500; i < 600; i += 20) {
                const isEndzone = (i < -400 || i > 400);
                const mat = new THREE.MeshPhysicalMaterial({ 
                    map: isEndzone ? endzoneTex : ((i/20)%2===0 ? grassLight : grassDark),
                    roughness: 0.6, metalness: 0.1, reflectivity: 0.5
                });
                const strip = new THREE.Mesh(new THREE.PlaneGeometry(260, 20), mat);
                strip.rotation.x = -Math.PI/2;
                strip.position.z = i + 10;
                strip.receiveShadow = true;
                scene.add(strip);

                const line = new THREE.Mesh(new THREE.PlaneGeometry(260, 0.6), new THREE.MeshStandardMaterial({color: 0xffffff, transparent: true, opacity: 0.8}));
                line.rotation.x = -Math.PI/2;
                line.position.set(0, 0.1, i);
                scene.add(line);
            }

            player = new THREE.Group();
            torsoGroup = new THREE.Group();
            const matShell = new THREE.MeshPhysicalMaterial({ color: 0xffffff, metalness: 0.1, roughness: 0.1, clearcoat: 1.0 });
            const matOrange = new THREE.MeshStandardMaterial({ color: 0xfb4f14 });
            const matChrome = new THREE.MeshPhysicalMaterial({ color: 0xcccccc, metalness: 1.0, roughness: 0.05 });
            const matBlue = new THREE.MeshStandardMaterial({ color: 0x002244 });
            const matSkin = new THREE.MeshStandardMaterial({ color: 0x8d5524 });

            const torso = new THREE.Mesh(new THREE.CylinderGeometry(1.2, 0.9, 2.2, 12), matShell);
            torso.position.y = 1.1; torso.scale.set(1.1, 1, 0.7);
            const waist = new THREE.Mesh(new THREE.CylinderGeometry(0.9, 0.9, 0.6, 12), matBlue);
            waist.position.y = -0.3;
            torsoGroup.add(torso, waist);
            torsoGroup.position.y = 2.7;

            const createArm = (side) => {
                const armPivot = new THREE.Group();
                const upper = new THREE.Mesh(new THREE.CylinderGeometry(0.35, 0.3, 1.2), matShell);
                upper.position.y = -0.6;
                const lower = new THREE.Mesh(new THREE.CylinderGeometry(0.25, 0.2, 1.2), matSkin);
                lower.position.y = -1.6;
                armPivot.add(upper, lower);
                armPivot.position.set(side * 1.3, 1.8, 0);
                return armPivot;
            };
            leftArm = createArm(1); rightArm = createArm(-1);
            torsoGroup.add(leftArm, rightArm);

            const createLeg = (side) => {
                const legPivot = new THREE.Group(); // This rotates from the hip
                const thigh = new THREE.Mesh(new THREE.CylinderGeometry(0.45, 0.35, 1.6), matShell);
                thigh.position.y = -0.8;
                const shin = new THREE.Mesh(new THREE.CylinderGeometry(0.35, 0.25, 1.6), matShell);
                shin.position.y = -2.2;
                const foot = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.4, 1.2), matBlue);
                foot.position.set(0, -3.0, -0.3);
                
                legPivot.add(thigh, shin, foot);
                legPivot.position.set(side * 0.5, 2.4, 0);
                return legPivot;
            };
            leftLeg = createLeg(1); rightLeg = createLeg(-1);
            player.add(leftLeg, rightLeg, torsoGroup);

            const jerseyNum = new THREE.Mesh(new THREE.BoxGeometry(0.8, 1, 0.15), matBlue);
            jerseyNum.position.set(0, 1.3, 0.45);
            torsoGroup.add(jerseyNum);
            
            const helm = new THREE.Mesh(new THREE.SphereGeometry(0.85, 32, 32), matShell);
            helm.position.y = 2.8;
            const mask = new THREE.Mesh(new THREE.TorusGeometry(0.48, 0.05, 12, 24, Math.PI), matChrome);
            mask.position.set(0, 2.5, -0.55);
            const stripe = new THREE.Mesh(new THREE.BoxGeometry(0.22, 1.8, 1.8), matOrange);
            stripe.position.y = 2.8;
            torsoGroup.add(helm, mask, stripe);

            player.traverse(n => { if(n.isMesh) n.castShadow = true; });
            player.visible = false;
            scene.add(player);

            ballInHand = createEliteBall();
            ballInHand.position.set(1.2, -0.9, -2);
            camera.add(ballInHand);
            scene.add(camera);

            document.getElementById('start-btn').onclick = () => { gameActive = true; document.getElementById('menu').style.display = 'none'; document.body.requestPointerLock(); };
            
            window.addEventListener('keydown', (e) => { 
                const key = e.key.toLowerCase();
                keys[key] = true; 
                if(key === 'u') { is3rd = !is3rd; player.visible = is3rd; ballInHand.visible = !is3rd; }
                if(gameActive && key === 'y' && !isKicking) {
                    isKicking = true;
                    kickProgress = 0;
                    kickBall();
                }
            });
            window.addEventListener('keyup', (e) => { keys[e.key.toLowerCase()] = false; });
            window.addEventListener('mousemove', (e) => { if(gameActive) { targetYaw -= e.movementX * 0.0015; targetPitch -= e.movementY * 0.0015; targetPitch = Math.max(-1.4, Math.min(1.4, targetPitch)); } });
            window.addEventListener('mousedown', () => { if(gameActive) throwBall(); });

            animate();
        }

        function createEliteBall() {
            const ball = new THREE.Group();
            const leather = new THREE.MeshStandardMaterial({ color: 0x4d2613, roughness: 0.8 });
            const body = new THREE.Mesh(new THREE.SphereGeometry(0.55, 32, 32), leather);
            body.scale.set(1, 0.8, 1.8); body.castShadow = true;
            const r1 = new THREE.Mesh(new THREE.TorusGeometry(0.35, 0.03, 8, 32), new THREE.MeshBasicMaterial({color: 0xffffff}));
            r1.position.z = 0.6;
            const r2 = r1.clone(); r2.position.z = -0.6;
            ball.add(body, r1, r2);
            return ball;
        }

        function throwBall() {
            const b = createEliteBall();
            const p = new THREE.Vector3();
            if(!is3rd) ballInHand.getWorldPosition(p); else p.copy(playerPos).add(new THREE.Vector3(0,5,0));
            b.position.copy(p);
            const dir = new THREE.Vector3(); camera.getWorldDirection(dir);
            footballs.push({ mesh: b, vel: dir.multiplyScalar(3.6), grav: -0.05, rotSpeed: 0.5 });
            scene.add(b);
            shake = 0.08;
        }

        function kickBall() {
            const b = createEliteBall();
            const p = new THREE.Vector3().copy(playerPos).add(new THREE.Vector3(0, 0.5, -2));
            b.position.copy(p);
            const dir = new THREE.Vector3(); camera.getWorldDirection(dir);
            dir.y += 0.4;
            footballs.push({ mesh: b, vel: dir.multiplyScalar(4.2), grav: -0.04, rotSpeed: 0.2 });
            scene.add(b);
            shake = 0.12;
        }

        function animate() {
            requestAnimationFrame(animate);
            if(gameActive) {
                currentYaw += (targetYaw - currentYaw) * 0.15;
                currentPitch += (targetPitch - currentPitch) * 0.15;

                const isMoving = keys['w'] || keys['s'] || keys['a'] || keys['d'];
                const speed = keys['shift'] ? 1.5 : 0.8;
                const f = new THREE.Vector3(Math.sin(currentYaw), 0, Math.cos(currentYaw)).negate();
                const r = new THREE.Vector3().crossVectors(f, new THREE.Vector3(0,1,0)).normalize();

                if(keys['w']) playerPos.addScaledVector(f, speed);
                if(keys['s']) playerPos.addScaledVector(f, -speed);
                if(keys['a']) playerPos.addScaledVector(r, -speed);
                if(keys['d']) playerPos.addScaledVector(r, speed);

                // --- IMPROVED ANIMATION SYSTEM ---
                if(isMoving && !isKicking) {
                    walkCycle += keys['shift'] ? 0.3 : 0.15;
                    const swing = Math.sin(walkCycle) * 0.6;
                    leftLeg.rotation.x = swing;
                    rightLeg.rotation.x = -swing;
                    leftArm.rotation.x = -swing;
                    rightArm.rotation.x = swing;
                    torsoGroup.position.y = 2.7 + Math.abs(Math.cos(walkCycle)) * 0.15;
                } else if(!isKicking) {
                    // Smooth Return to Idle
                    leftLeg.rotation.x *= 0.8;
                    rightLeg.rotation.x *= 0.8;
                    leftArm.rotation.x *= 0.8;
                    rightArm.rotation.x *= 0.8;
                    torsoGroup.position.y = THREE.MathUtils.lerp(torsoGroup.position.y, 2.7, 0.1);
                }

                // --- REALISTIC KICK MOTION (RIGHT LEG) ---
                if(isKicking) {
                    kickProgress += 0.08; // Control speed of animation
                    
                    if(kickProgress < 0.3) {
                        // Phase 1: Snap leg forward (Kicking the ball)
                        rightLeg.rotation.x = THREE.MathUtils.lerp(0, 1.8, kickProgress / 0.3);
                        // Ensure the other leg stays planted
                        leftLeg.rotation.x = 0;
                    } else if(kickProgress < 1.0) {
                        // Phase 2: Smooth follow-through and return
                        rightLeg.rotation.x = THREE.MathUtils.lerp(1.8, 0, (kickProgress - 0.3) / 0.7);
                    } else {
                        isKicking = false;
                        kickProgress = 0;
                    }
                }

                player.position.copy(playerPos);
                player.rotation.y = currentYaw;
                camera.rotation.set(currentPitch, currentYaw, 0, 'YXZ');
                
                if(!is3rd) {
                    camera.position.copy(playerPos).add(new THREE.Vector3(0, 5.2, 0.2));
                } else {
                    const tightOffset = new THREE.Vector3(1.8, 6.5, 12).applyQuaternion(camera.quaternion);
                    camera.position.lerp(playerPos.clone().add(tightOffset), 0.15);
                }

                if(shake > 0) {
                    camera.position.x += (Math.random()-0.5) * shake;
                    camera.position.y += (Math.random()-0.5) * shake;
                    shake *= 0.85;
                }

                for (let i = footballs.length - 1; i >= 0; i--) {
                    let fb = footballs[i];
                    fb.vel.y += fb.grav; fb.mesh.position.add(fb.vel);
                    fb.mesh.rotateZ(fb.rotSpeed); fb.mesh.rotateX(0.05);
                    if (fb.mesh.position.y < 0.2) { scene.remove(fb.mesh); footballs.splice(i, 1); }
                }

                if(playerPos.z < -440) { score++; document.getElementById('score').innerText = score; playerPos.set(0, 0, 150); }
            }
            renderer.render(scene, camera);
        }
        init();
    </script>
</body>
</html>
