<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="retro bowl.jpg" type="image/jpeg">
    <title>Retro Bowl POV | Alexx743</title>
    <style>
        body { margin: 0; overflow: hidden; background: #27ae60; font-family: 'Segoe UI', sans-serif; }
        
        /* Your Custom Top Navigation */
        h2 { color: white; text-align: center; margin: 10px 0; font-weight: 900; letter-spacing: 2px; }
        .topnav { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
        .divbutton { 
            padding: 10px 20px; 
            background: rgba(255,255,255,0.1); 
            border: 1px solid white; 
            color: white; 
            cursor: pointer; 
            font-weight: bold;
            transition: 0.3s;
        }
        .divbutton:hover { background: white; color: black; }

        /* Game UI Overlay */
        #ui-layer { position: absolute; inset: 0; pointer-events: none; z-index: 5; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 8px; height: 8px; border: 2px solid white; border-radius: 50%; transform: translate(-50%, -50%); }
        #stats { position: absolute; top: 80px; left: 20px; color: white; text-shadow: 2px 2px 0px #000; font-size: 24px; font-weight: 900; }
        #power-meter { position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%); width: 200px; height: 12px; background: rgba(0,0,0,0.5); border: 2px solid white; display: none; border-radius: 6px; overflow: hidden; }
        #power-fill { width: 0%; height: 100%; background: #f1c40f; }

        /* Start Menu */
        #menu-container { position: absolute; inset: 0; background: rgba(0,0,0,0.85); display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; z-index: 100; backdrop-filter: blur(8px); }
        .btn-play { padding: 15px 50px; background: #fff; color: #000; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 20px; transition: 0.2s; }
        .btn-play:hover { background: #2ecc71; color: white; transform: scale(1.1); }
    </style>
</head>
<body>

    <h2>RETRO BOWL POV</h2>

    <div class="topnav">
        <a href="index.html"><button class="divbutton">Home</button></a>
        <a href="games.html"><button class="divbutton">Games</button></a>
        <a href="shooter.html"><button class="divbutton">Shooter</button></a>
        <a href="sports.html"><button class="divbutton">Sports</button></a>
        <a href="cars.html"><button class="divbutton">Cars</button></a>
    </div>

    <div id="ui-layer">
        <div id="crosshair"></div>
        <div id="stats">1ST & 10</div>
        <div id="power-meter"><div id="power-fill"></div></div>
    </div>

    <div id="menu-container">
        <h1 style="font-size: 48px; margin-bottom: 0;">RETRO BOWL POV</h1>
        <p style="margin-bottom: 30px; opacity: 0.8;">WASD: Run | SHIFT: Sprint | HOLD CLICK: Power Throw</p>
        <button class="btn-play" id="start-btn">ENTER FIELD</button>
    </div>

    <script type="importmap"> { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } } </script>
    <script type="module" src="game.js"></script>
</body>
</html>
